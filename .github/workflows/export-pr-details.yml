name: Export Pull Request Details

permissions:
  contents: read
  pull-requests: read
  issues: read

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull request number"
        required: true
        type: string

jobs:
  export-pr-details:
    name: Export PR details as JSON
    runs-on: ubuntu-latest

    steps:
      - name: Check PR existence and export details
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          PR_NUMBER: ${{ github.event.inputs.pr_number }}
        run: |
          # 厳格モード: エラー時は即終了
          set -euo pipefail
          trap 'echo "❌ Error in Check PR existence and export details step (line $LINENO). Check operations above."' ERR

          API_ROOT="https://api.github.com/repos/$OWNER/$REPO"

          # ---------------------------------------------------
          # 共通関数
          # ---------------------------------------------------
          fetch_single_json() {
            local url="$1"
            local operation="$2"
            local response http_code body

            response=$(curl -s -w "\n%{http_code}" \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2026-03-10" \
              "$url")

            http_code=$(echo "$response" | tail -n1)
            body=$(echo "$response" | sed '$d')

            if [ "$http_code" = "200" ]; then
              echo "$body"
            else
              echo "❌ Failed to $operation. Status: $http_code"
              echo "Body: $body"
              exit 1
            fi
          }

          fetch_paginated_array() {
            local endpoint="$1"
            local operation="$2"
            local page=1
            local all='[]'

            while true; do
              local url response http_code body count
              url="$API_ROOT/$endpoint?per_page=100&page=$page"

              response=$(curl -s -w "\n%{http_code}" \
                -H "Authorization: Bearer $GH_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2026-03-10" \
                "$url")

              http_code=$(echo "$response" | tail -n1)
              body=$(echo "$response" | sed '$d')

              if [ "$http_code" != "200" ]; then
                echo "❌ Failed to $operation. Status: $http_code"
                echo "Body: $body"
                exit 1
              fi

              count=$(echo "$body" | jq 'length')
              all=$(echo "$all" | jq -c --argjson chunk "$body" '. + $chunk')

              if [ "$count" -lt 100 ]; then
                break
              fi

              page=$((page + 1))
            done

            echo "$all"
          }

          # ---------------------------------------------------
          # 1. 入力値の基本検証
          # ---------------------------------------------------
          if ! [[ "$PR_NUMBER" =~ ^[0-9]+$ ]]; then
            echo "❌ Invalid pull request number: $PR_NUMBER"
            exit 1
          fi

          PR_URL="$API_ROOT/pulls/$PR_NUMBER"

          echo "Checking if pull request #$PR_NUMBER exists..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2026-03-10" \
            "$PR_URL")

          if [ "$STATUS" == "404" ]; then
            echo "❌ Pull request #$PR_NUMBER not found."
            exit 1
          elif [ "$STATUS" != "200" ]; then
            echo "❌ Failed to check pull request existence. Status: $STATUS"
            exit 1
          fi

          # ---------------------------------------------------
          # 2. PR 関連データの取得
          # ---------------------------------------------------
          echo "✅ Pull request #$PR_NUMBER exists."
          echo "Collecting pull request details and related resources..."

          PR_JSON=$(fetch_single_json "$PR_URL" "fetch pull request details")
          REVIEWS_JSON=$(fetch_paginated_array "pulls/$PR_NUMBER/reviews" "fetch pull request reviews")
          ISSUE_COMMENTS_JSON=$(fetch_paginated_array "issues/$PR_NUMBER/comments" "fetch issue comments")
          REVIEW_COMMENTS_JSON=$(fetch_paginated_array "pulls/$PR_NUMBER/comments" "fetch review comments")
          COMMITS_JSON=$(fetch_paginated_array "pulls/$PR_NUMBER/commits" "fetch pull request commits")
          FILES_JSON=$(fetch_paginated_array "pulls/$PR_NUMBER/files" "fetch changed files")
          ISSUE_EVENTS_JSON=$(fetch_paginated_array "issues/$PR_NUMBER/events" "fetch issue events")

          # ---------------------------------------------------
          # 3. 総合 JSON の組み立てとログ出力
          # ---------------------------------------------------
          FINAL_JSON=$(jq -n \
            --arg exported_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg owner "$OWNER" \
            --arg repo "$REPO" \
            --arg pr_number "$PR_NUMBER" \
            --argjson pr "$PR_JSON" \
            --argjson reviews "$REVIEWS_JSON" \
            --argjson issue_comments "$ISSUE_COMMENTS_JSON" \
            --argjson review_comments "$REVIEW_COMMENTS_JSON" \
            --argjson commits "$COMMITS_JSON" \
            --argjson files "$FILES_JSON" \
            --argjson issue_events "$ISSUE_EVENTS_JSON" \
            '{
              exported_at: $exported_at,
              repository: {
                owner: $owner,
                name: $repo
              },
              pull_request_number: ($pr_number | tonumber),
              pull_request: $pr,
              reviews: $reviews,
              issue_comments: $issue_comments,
              review_comments: $review_comments,
              commits: $commits,
              files: $files,
              issue_events: $issue_events,
              summary: {
                reviews_count: ($reviews | length),
                issue_comments_count: ($issue_comments | length),
                review_comments_count: ($review_comments | length),
                commits_count: ($commits | length),
                files_count: ($files | length),
                issue_events_count: ($issue_events | length)
              }
            }')

          echo "✅ Pull request aggregated JSON built successfully."
          echo "⬇️ Pull request aggregated JSON:"
          echo "$FINAL_JSON" | jq .
